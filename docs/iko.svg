<svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 256 256"
    width="100%"
    height="100%"
>
  <defs>
    <!-- Background Icon Plate Gradient (Rich dark indigo to make the ghost pop) -->
    <!-- <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#241B3B" />
      <stop offset="100%" stop-color="#0E101A" />
    </linearGradient> -->

    <!-- Main Ghost Gradient (Brighter, higher contrast purple to blue) -->
    <linearGradient
            id="ghostGrad"
            x1="0%"
            y1="10%"
            x2="0%"
            y2="95%"
            gradientUnits="userSpaceOnUse"
        >
      <stop offset="0%" stop-color="#E1BFFF" />
      <stop offset="40%" stop-color="#9C80FF" />
      <stop offset="100%" stop-color="#2A50FF" />
    </linearGradient>

    <!-- Ambient Glow behind the ghost -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C89DFF" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#C89DFF" stop-opacity="0" />
    </radialGradient>

    <!-- Premium Drop Shadow for App Icon Depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow
                dx="0"
                dy="12"
                stdDeviation="10"
                flood-color="#000000"
                flood-opacity="0.4"
            />
      <feDropShadow
                dx="0"
                dy="4"
                stdDeviation="4"
                flood-color="#000000"
                flood-opacity="0.25"
            />
    </filter>

    <!-- Soft Blur for Highlights -->
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" />
    </filter>
  </defs>

  <!-- Ambient Glow behind Ghost -->
  <circle cx="128" cy="138" r="90" fill="url(#glowGrad)" />

  <!-- Dynamic Sparkles (Replacing chaotic speed lines for a cleaner, magical look) -->
  <!-- <g fill="#FFFFFF" opacity="0.8">
    <path d="M 195 45 Q 195 55 205 55 Q 195 55 195 65 Q 195 55 185 55 Q 195 55 195 45 Z" />
    <path d="M 50 180 Q 50 187 57 187 Q 50 187 50 194 Q 50 187 43 187 Q 50 187 50 180 Z" opacity="0.6" />
    <path d="M 215 130 Q 215 134 219 134 Q 215 134 215 138 Q 215 134 211 134 Q 215 134 215 130 Z" opacity="0.4" />
  </g> -->

  <!-- Main Ghost Group (Tilted slightly for dynamic movement) -->
  <g
        transform="translate(128, 138) rotate(5) translate(-128, -138)"
        filter="url(#shadow)"
    >

    <!-- Right Arm (Reaching up/forward) -->
    <rect
            x="168"
            y="105"
            width="40"
            height="24"
            rx="12"
            transform="rotate(-28, 188, 117)"
            fill="url(#ghostGrad)"
        />

    <!-- Left Arm (Tucked slightly lower) -->
    <rect
            x="48"
            y="135"
            width="36"
            height="24"
            rx="12"
            transform="rotate(18, 66, 147)"
            fill="url(#ghostGrad)"
        />

    <!-- Main Solid Ghost Body (Clean, chunky silhouette for scalability) -->
    <path
            d="
      M 65 140
      C 65 75, 85 50, 128 50
      C 171 50, 191 75, 191 140
      V 185
      C 191 200, 175 202, 163 188
      Q 146 164, 128 188
      Q 110 212, 93 188
      C 81 174, 65 200, 65 185
      Z"
            fill="url(#ghostGrad)"
        />

    <!-- 3D Glossy Highlight on Head -->
    <!-- <ellipse cx="100" cy="72" rx="28" ry="12" transform="rotate(-15, 100, 72)" fill="#FFFFFF" opacity="0.4" filter="url(#blur)" />
    <path d="M 68 110 Q 68 80 100 60" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.25" filter="url(#blur)" /> -->

    <!-- Face Group -->
    <g>
      <!-- Left Eye -->
      <ellipse cx="102" cy="115" rx="7" ry="13" fill="#FFFFFF" />

      <!-- Right Eye -->
      <ellipse cx="154" cy="115" rx="7" ry="13" fill="#FFFFFF" />

      <!-- Blushing Cheeks -->
      <!-- <ellipse cx="86" cy="130" rx="9" ry="5" fill="#FF88BB" opacity="0.35" />
      <ellipse cx="170" cy="130" rx="9" ry="5" fill="#FF88BB" opacity="0.35" />
       -->
      <!-- Super Cute Happy Mouth (Curved Line) -->
      <path
                d="M 120 135 Q 128 140 136 135"
                fill="none"
                stroke="#FFFFFF"
                stroke-width="5"
                stroke-linecap="round"
            />
    </g>
  </g>
</svg>
